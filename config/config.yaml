# ============================================================
# Retail Sales Forecasting & Inventory Optimization System
# Configuration File
# ============================================================

project:
  name: "Retail Sales Forecasting & Inventory Optimization"
  version: "1.0.0"
  author: "Your Name"

# ----------------------------
# Dataset Configuration
# ----------------------------
data:
  raw_path: "data/raw_sales_data.csv"
  processed_path: "data/processed_sales_data.csv"
  forecast_output: "outputs/forecast_results.csv"
  inventory_output: "outputs/inventory_recommendations.csv"
  abc_output: "outputs/abc_analysis.csv"

  # Simulation parameters
  simulation:
    num_stores: 5
    num_products: 20
    start_date: "2022-01-01"
    end_date: "2024-12-31"
    seed: 42

# ----------------------------
# Model Configuration
# ----------------------------
model:
  forecast_horizon: 30         # Days to forecast ahead
  train_test_split: 0.8        # 80% train, 20% test
  rolling_window: 7            # Rolling average window
  models_to_run:
    - "random_forest"
    - "xgboost"
    - "arima"

  random_forest:
    n_estimators: 100
    max_depth: 10
    random_state: 42

  xgboost:
    n_estimators: 100
    learning_rate: 0.1
    max_depth: 6
    random_state: 42

  arima:
    order: [1, 1, 1]           # (p, d, q)

# ----------------------------
# Inventory Configuration
# ----------------------------
inventory:
  service_level: 0.95          # 95% service level → Z = 1.65
  z_score: 1.65
  lead_time_days: 7            # Supplier lead time in days
  holding_cost_rate: 0.25      # 25% of unit cost per year
  ordering_cost: 50            # Fixed cost per order (INR)

  # ABC Analysis thresholds
  abc:
    A_threshold: 0.70          # Top 70% revenue = A
    B_threshold: 0.90          # Next 20% revenue = B
    # Remaining 10% = C

# ----------------------------
# Paths
# ----------------------------
paths:
  models_dir: "models/"
  images_dir: "images/"
  reports_dir: "reports/"
  outputs_dir: "outputs/"
  notebooks_dir: "notebooks/"
